<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion · Spotter</title>
  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap">

  <link rel="stylesheet" href="/css/global.css">
  <link rel="stylesheet" href="/css/login.css">
</head>
<body>

<div class="auth-page">

  <a href="/" class="auth-back">← Retour à l'accueil</a>

  <div class="auth-card">
    <a href="/" class="auth-brand">
      <span class="brand-mark"></span>
      Spotter
    </a>

    <div class="auth-header">
      <div class="auth-eyebrow">Connexion</div>
      <h1>Reprends la main sur ton dashboard.</h1>
      <p class="auth-sub">Avec l'email et le mot de passe que tu as créés au moment du téléchargement.</p>
    </div>

    <form id="loginForm" class="auth-form" onsubmit="return false;">
      <div class="auth-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="vous@cabinet.fr" autocomplete="email" required />
      </div>

      <div class="auth-field">
        <label for="loginPassword">Mot de passe</label>
        <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password" required />
      </div>

      <div class="auth-error" id="loginError"></div>

      <button type="submit" id="loginSubmit" class="btn btn-primary btn-lg auth-submit">
        Se connecter →
      </button>
    </form>

    <div class="auth-foot">
      Pas encore de compte ? <a href="/#metiers">Démarrer le questionnaire</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/js/lib/supabase-config.js"></script>
<script src="/js/lib/supabase-client.js"></script>
<script src="/js/pages/login.js"></script>

</body>
</html>
