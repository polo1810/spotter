# ============================================================
# SPOTTER · Configuration Netlify
# ============================================================
# Site 100% statique — aucun build step.
# La landing s'auto-compose au chargement à partir des partials
# de /partials/landing/ (cf. /js/pages/landing.js).
# ============================================================

# Cache long pour les assets statiques (CSS, JS, fonts, images,
# partials HTML). Les visiteurs récurrents chargent le site
# quasi instantanément.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/partials/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Le HTML reste en cache court pour que les changements ressortent
# rapidement.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
