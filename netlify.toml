# ============================================================
# SPOTTER · Configuration Netlify
# ============================================================
# Build : tools/build.js concatène les partials landing → index.html
# (cf. README.md section "Architecture landing")
# ============================================================

[build]
  command = "node tools/build.js"
  publish = "."

# Cache long pour les assets statiques (CSS, JS, fonts, images).
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML en cache court pour que les changements ressortent vite.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
