# ============================================================
# SPOTTER · Configuration Netlify
# ============================================================
# Build : tools/build.js concatène les partials landing → index.html
# (cf. README.md section "Architecture landing")
# ============================================================

[build]
  command = "node tools/build.js"
  publish = "."

# Pour CSS / JS / partials : cache court avec revalidation.
# Le navigateur revérifie à chaque visite ; si le fichier n'a pas
# changé, Netlify renvoie 304 (Not Modified), c'est gratuit.
# Si on changeait, l'ancien cache d'un an empêcherait la mise à jour
# de remonter aux visiteurs récurrents.
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/partials/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Les images / fonts (qu'on touche très rarement) gardent un cache long.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

# HTML en cache court pour que les changements ressortent vite.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
